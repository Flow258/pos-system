events {
    worker_connections 1024;
}

http {
    # Define upstream backend services (Docker service names as hostnames)
    upstream laravel  { server laravel:8000; }
    upstream frontend { server frontend:5173; }
    # upstream vision   { server vision:5000; }   <── ADD # HERE

    server {
        listen 80;
        server_name _;
        client_max_body_size 50M;

        # ── Laravel API routes ──────────────────────────────
        location /api/ {
            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Python Vision/YOLO Service ──────────────────────
        # location /vision/ {                            <── ADD # HERE
        #     proxy_pass http://vision;                  <── ADD # HERE
        #     proxy_set_header Host $host;                <── ADD # HERE
        #     proxy_set_header X-Real-IP $remote_addr;   <── ADD # HERE
        #     client_max_body_size 20M;                  <── ADD # HERE
        #     proxy_read_timeout 120s;                   <── ADD # HERE
        # }                                              <── ADD # HERE

        # ── React Frontend (with WebSocket for Vite HMR) ───
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

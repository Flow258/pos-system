events {
    worker_connections 1024;
}

http {
    # Define upstream backend services (Docker service names as hostnames)
    upstream laravel  { server laravel:8000; }
    # upstream vision   { server vision:5000; }   <── ADD # HERE

    server {
        listen 80;
        server_name _;
        client_max_body_size 50M;

        # ── Laravel API routes ──────────────────────────────
        location /api/ {
            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Python Vision/YOLO Service ──────────────────────
        # location /vision/ {                            <── ADD # HERE
        #     proxy_pass http://vision;                  <── ADD # HERE
        #     proxy_set_header Host $host;                <── ADD # HERE
        #     proxy_set_header X-Real-IP $remote_addr;   <── ADD # HERE
        #     client_max_body_size 20M;                  <── ADD # HERE
        #     proxy_read_timeout 120s;                   <── ADD # HERE
        # }                                              <── ADD # HERE

        # ── React Frontend (built static files) ──────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful - Alquizalas Store</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0fdf4;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #16a34a; margin: 0 0 8px; }
    p { color: #666; margin: 0 0 24px; }
    .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #16a34a; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Your GCash payment has been confirmed.</p>
    <div class="spinner"></div>
    <p style="font-size: 12px; color: #999;">Closing automatically...</p>
  </div>

  <script>
    // Send success message to the parent POS window
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (window.opener) {
      window.opener.postMessage({
        type: 'PAYMONGO_PAYMENT_SUCCESS',
        session_id: sessionId,
      }, '*');
    }

    // Close this popup after a brief delay
    setTimeout(() => window.close(), 2000);
  </script>
</body>
</html>

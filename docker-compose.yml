services:

  mysql:
    image: mysql:8.0
    container_name: pos_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: AshleyDave_09157652245
      MYSQL_DATABASE: pos_system
      MYSQL_USER: root
      MYSQL_PASSWORD: AshleyDave_09157652245
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s

  laravel:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: pos_laravel
    restart: unless-stopped
    environment:
      APP_NAME: POSSystem
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://192.168.1.36:8888
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pos_system
      DB_USERNAME: root
      DB_PASSWORD: AshleyDave_09157652245
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      PAYMONGO_SECRET_KEY: "${PAYMONGO_SECRET_KEY}"
      PAYMONGO_PUBLIC_KEY: "${PAYMONGO_PUBLIC_KEY}"
      FRONTEND_URL: http://192.168.1.36:8888
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/storage/logs
    networks:
      - pos_network
    command: >
      sh -c "php artisan migrate --force &&
             php artisan config:cache &&
             php artisan route:cache &&
             php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    image: node:22-alpine
    container_name: pos_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./pos-frontend:/app
    ports:
      - "5174:5173"
    networks:
      - pos_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - laravel
      - frontend
    networks:
      - pos_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pos_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - pos_network

networks:
  pos_network:
    driver: bridge